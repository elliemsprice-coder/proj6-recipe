version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: recipe-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: recipe-backend
    restart: always
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  mongo_data: